idea:
  title: PEDV broad-spectrum vaccine via whole-virus prime and epitope boost
  domain: biomedical_research
  hypothesis: 'A combined immunization strategy using whole-virus priming and conserved-epitope
    boosting can achieve broader and more focused protective immunity than either
    approach alone.

    '
  description: 'This project investigates a PEDV vaccine strategy that combines a
    G2c-based inactivated whole-virus vaccine (as immune foundation) with an AI-designed
    conserved epitope-focused booster antigen. The goal is to evaluate whether antigenic
    breadth and epitope precision can be synergistically integrated to improve cross-protection.

    '
  objectives:
  - Evaluate whole-virus inactivated PEDV vaccine as baseline immunity
  - Identify conserved neutralizing epitopes
  - Design epitope-focused antigens using AI tools
  - Compare prime-boost vs single modality strategies
  - Understand mechanism of broad protection
  tasks:
  - name: literature_review
    description: Review PEDV vaccine strategies and conserved epitopes
  - name: epitope_analysis
    description: Identify conserved neutralizing epitopes
  - name: design_strategy
    description: Design AI-based epitope-focused antigen
  - name: comparison_framework
    description: Compare vaccination strategies
  - name: mechanism_analysis
    description: Analyze immune mechanism
